site_name: SIPhon
site_description: High-performance SIP proxy, B2BUA, and IMS platform in Rust with free-threaded Python scripting
site_url: https://siphon-sip.org/
repo_url: https://github.com/siphon-project/siphon-sip
repo_name: siphon-project/siphon-sip
edit_uri: edit/main/docs/
copyright: MIT-licensed. SIPhon is built on the shoulders of Kamailio and OpenSIPS.

docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: README.md
  - Cookbook:
      - Overview: cookbook/index.md
      - Registrar: cookbook/registrar.md
      - Stateful proxy: cookbook/proxy.md
      - Load balancer: cookbook/load-balancer.md
      - SBC (B2BUA): cookbook/sbc.md
      - Media & RTP profiles: cookbook/media-rtp.md
      - Hardening & security: cookbook/security.md
      - Monitoring & observability: cookbook/monitoring.md
  - API reference:
      - Overview: reference/index.md
      - Request: reference/request.md
      - Reply: reference/reply.md
      - Call: reference/call.md
      - SDP: reference/sdp.md
      - SIP types: reference/types.md
      - Proxy & B2BUA: reference/proxy.md
      - Registrar: reference/registrar.md
      - Auth & security: reference/security.md
      - Media: reference/media.md
      - Gateway: reference/gateway.md
      - Diameter: reference/diameter.md
      - IMS control: reference/ims.md
      - Observability: reference/observability.md
      - Testing harness: reference/testing.md
  - Running in production:
      - Transports & networking: transports.md
      - Media engines (rtpengine / siphon-rtp): media-engines.md
      - Kernel firewall (nf_tables): kernel-firewall.md
      - Scaling, clustering & redundancy: scaling-and-redundancy.md
      - Deployment & operations: deployment.md
      - Supply chain & SBOM: supply-chain.md
      - Migrating from Kamailio / OpenSIPS: migrating-from-kamailio-opensips.md
  - Extensions:
      - Overview: extensions.md
      - SMPP addon docs ↗: https://smpp.siphon-sip.org/
      - HTTP addon docs ↗: https://http.siphon-sip.org/
  - Commercial support: support.md
  - Internals:
      - Handler execution model: handler-execution-model.md
      - Feature readiness matrix: feature-readiness-matrix.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # `paths: [sdk]` lets griffe read `siphon_sdk` straight from the
          # source tree — the SDK does not need to be pip-installed for the
          # docs build.
          paths: [sdk]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: false
            show_root_toc_entry: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            heading_level: 3
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: false
            docstring_section_style: table
            filters: ["!^_"]
