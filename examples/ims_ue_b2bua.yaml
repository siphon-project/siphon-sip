# ---------------------------------------------------------------------------
# IMS UE B2BUA — register INTO an IMS core as a handset (IMS-AKA over IPsec,
# 3GPP TS 33.203) and bridge a plain-SIP "tester" both ways:
#
#     tester  <--plain SIP-->  siphon (this)  <--IPsec / IMS-AKA-->  P-CSCF / IMS
#
#     MO:  tester -> siphon -> IMS    (originating)
#     MT:  IMS    -> siphon -> tester  (terminating)
#
# Run (needs CAP_NET_ADMIN for the kernel IPsec SAs):
#     sudo -E env "PATH=$PATH" PYO3_PYTHON=python3 \
#         cargo run --release -- --config examples/ims_ue_b2bua.yaml
#
# Fill in the ${...} values or set the matching env vars. Defaults use the
# 3GPP test range (MCC 001 / MNC 01) and TS 35.208 Test Set 1 secrets —
# replace USIM_K / USIM_OPC with your real subscriber keys.
# ---------------------------------------------------------------------------

server:
  instance_id: "${POD_NAME:-ims-ue-0}"

# Bind to a SPECIFIC local IP, NOT 0.0.0.0: the UE address used for the IPsec
# SA selectors and the protected-REGISTER source is taken from the primary
# listen address. 0.0.0.0 would make the kernel XFRM selectors unusable.
advertised_address: "${UE_IP:-10.0.0.20}"

listen:
  udp:
    - "${UE_IP:-10.0.0.20}:5060"     # plain SIP toward the tester
    - "${UE_IP:-10.0.0.20}:6100"     # UE protected client port (ue_port_c)
    - "${UE_IP:-10.0.0.20}:6101"     # UE protected server port (ue_port_s)

domain:
  local:
    - "${UE_IP:-10.0.0.20}"

script:
  path: "examples/ims_ue_b2bua.py"
  reload: auto

# Enables the IpsecManager and per-listener UDP egress (so the protected
# REGISTER can be sourced from ue_port_c). `netlink` needs CAP_NET_ADMIN;
# use `ip` to shell out to /sbin/ip xfrm in constrained containers.
ipsec:
  backend: "${IPSEC_BACKEND:-netlink}"

# An (empty) registrant block enables the outbound-registration manager and
# its refresh loop. The actual binding is added at runtime by the script via
# registration.add(...), so it can carry the AKA + IPsec parameters.
registrant:
  entries: []

log:
  level: info
