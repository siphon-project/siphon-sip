# SIPhon IMS P-CSCF (Proxy-CSCF) configuration
#
# The P-CSCF is the first contact point for UEs in the IMS network.
# It handles:
#   - IPsec security association negotiation (3GPP TS 33.203)
#   - AKA digest authentication (local Milenage, no HSS needed)
#   - Media anchoring via RTPEngine
#   - Diameter Rx to PCRF for QoS/policy (bearer authorization)
#   - NAT traversal for UEs behind NAT
#   - Path header insertion for routing through the P-CSCF
#
# Equivalent to: opensips_ims_pcscf in docker_open5gs
#
# Usage:
#   siphon --config examples/ims_pcscf.yaml

listen:
  udp:
    - "0.0.0.0:5060"        # Unprotected SIP (initial REGISTER)
    - "0.0.0.0:5064"        # IPsec protected client port
    - "0.0.0.0:5066"        # IPsec protected server port
  tcp:
    - "0.0.0.0:5060"
    - "0.0.0.0:5064"        # IPsec protected client port (ESP-over-TCP, TS 33.203 §7.2)
    - "0.0.0.0:5066"        # IPsec protected server port (ESP-over-TCP)

  # --- Dual-stack Gm (IPv4 + IPv6) ---------------------------------------
  # A P-CSCF serving VoLTE UEs on both IPv4 and IPv6 bearers binds an
  # explicit v4 AND v6 Gm listener set (per GSMA IR.92 a UE registers over
  # one family at a time; this is dual-stack per process, not per UE).
  # Prefer EXPLICIT per-family binds over a single `[::]` — siphon does not
  # normalise v4-mapped (`::ffff:`) peers, so an explicit v4 listener keeps
  # addresses canonical.  siphon then stamps the family-matching local
  # identity (Via / Record-Route host, IPsec SA local address, SDP o=) for
  # each UE.  Give each family its own routable identity with a per-listener
  # `advertise` (an FQDN with both A + AAAA works for either family):
  #
  # udp:
  #   - { address: "192.0.2.10:5060",          advertise: "pcscf.ims.example" }
  #   - { address: "192.0.2.10:5064",          advertise: "pcscf.ims.example" }
  #   - { address: "192.0.2.10:5066",          advertise: "pcscf.ims.example" }
  #   - { address: "[2001:db8:ac10::10]:5060", advertise: "pcscf.ims.example" }
  #   - { address: "[2001:db8:ac10::10]:5064", advertise: "pcscf.ims.example" }
  #   - { address: "[2001:db8:ac10::10]:5066", advertise: "pcscf.ims.example" }
  # tcp:  # ESP-over-TCP mirror (TS 33.203 §7.2), same six entries
  #   - { address: "192.0.2.10:5060" }
  #   - { address: "[2001:db8:ac10::10]:5060" }
  #   # ...

# Public IP — set to the P-CSCF's routable address (per-listener `advertise`
# above overrides this for dual-stack, so each family gets its own identity)
advertised_address: "10.0.0.10"

domain:
  local:
    - "ims.example.com"
    - "10.0.0.10"

script:
  path: "examples/ims_pcscf.py"
  reload: auto

# ---------------------------------------------------------------------------
# Registrar — P-CSCF stores contacts locally for routing
# ---------------------------------------------------------------------------
registrar:
  backend: memory
  default_expires: 600000    # IMS registrations are long-lived
  max_expires: 600000

# ---------------------------------------------------------------------------
# Authentication — AKA digest with local Milenage credentials
# ---------------------------------------------------------------------------
# For production IMS, use auth.backend: diameter_cx to query the HSS.
# Local AKA credentials are useful for lab/test environments without an HSS.
auth:
  realm: "ims.example.com"
  backend: static
  aka_credentials:
    "001010000000001":
      k: "465b5ce8b199b49faa5f0a2ee238a6bc"
      op: "cdc202d5123e20f62b6d676ac72cb318"
      amf: "8000"
    "001010000000002":
      k: "0396eb317b6d1c36f19c1c84cd6ffd16"
      op: "ff9bb4d0b607f35029a9384c2e7eb8a3"
      amf: "8000"

# ---------------------------------------------------------------------------
# IPsec — 3GPP TS 33.203 security associations
# ---------------------------------------------------------------------------
ipsec:
  pcscf_port_c: 5064         # P-CSCF client port (protected, shared across UEs)
  pcscf_port_s: 5066         # P-CSCF server port (protected, shared across UEs)
  backend: netlink           # "netlink" (default, fastest) or "ip" (shell-out fallback)
  # spi_range_start: 10000   # set per-instance for multi-process P-CSCFs
  # spi_range_count: 8192
  # Path-token MT routing (RFC 3327 §5 / TS 24.229 §5.2.7.2): the
  # host part siphon writes into the Path URI from
  # ``request.add_pcscf_path(token)``.  Must resolve back to *this*
  # P-CSCF instance — typically the pod FQDN or a per-replica DNS name
  # in a StatefulSet deployment so MT requests from the S-CSCF route to
  # the instance that owns the inbound flow.
  path_host: "pcscf-0.ims.example.com:5060"

# ---------------------------------------------------------------------------
# NAT traversal
# ---------------------------------------------------------------------------
nat:
  fix_contact: true

# ---------------------------------------------------------------------------
# Media — RTPEngine for media anchoring
# ---------------------------------------------------------------------------
# media:
#   rtpengine:
#     address: "127.0.0.1:22222"
#     timeout_ms: 1000

# ---------------------------------------------------------------------------
# Diameter Rx — QoS policy via PCRF
# ---------------------------------------------------------------------------
# The P-CSCF sends AAR to the PCRF on INVITE (media authorization)
# and STR on BYE (session termination).
#
# diameter:
#   origin_host: "pcscf.ims.example.com"
#   origin_realm: "ims.example.com"
#   product_name: "SIPhon-PCSCF"
#   peers:
#     - name: "pcrf1"
#       host: "pcrf.ims.example.com"
#       port: 3868
#       destination_realm: "ims.example.com"
#   routes:
#     - application: rx
#       peers: ["pcrf1"]

# ---------------------------------------------------------------------------
# Transaction timers
# ---------------------------------------------------------------------------
transaction:
  timeout_secs: 5
  invite_timeout_secs: 30

# ---------------------------------------------------------------------------
# Cache — Redis-backed per-call state for the script
#
# siphon scripts must NOT keep cross-request state in Python module globals:
# they are wiped on hot-reload and not shared across replicas.  ims_pcscf.py
# keeps its Rx-session and Path-token maps here instead, keyed by Call-ID, so
# the BYE/CANCEL teardown still finds the state after a script reload — and,
# with a shared Redis, even when it lands on a different P-CSCF replica than
# the one that reserved the bearer.  The local LRU in front keeps the common
# same-instance lookup off the wire.  Pairs with the Diameter Rx config in a
# real deployment; without Redis the QoS bookkeeping simply no-ops.
# ---------------------------------------------------------------------------
cache:
  - name: "qos_sessions"
    url: "${REDIS_URL:-redis://127.0.0.1:6379}"
    local_ttl_secs: 30
  - name: "path_tokens"
    url: "${REDIS_URL:-redis://127.0.0.1:6379}"
    local_ttl_secs: 30

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log:
  level: info
  format: pretty
