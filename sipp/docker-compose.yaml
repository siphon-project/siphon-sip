  # ── IMS E2E test (MOC/MTC call through S-CSCF) ──────────────────────────
  # Full IMS call flow with standard digest auth:
  #   1. Register alice and bob
  #   2. alice INVITEs bob through S-CSCF
  #   3. bob answers, call is up
  #   4. alice sends BYE
  #
  # IP assignments:
  #   172.20.0.70 — siphon-ims (combined P-CSCF + S-CSCF)
  #   172.20.0.72 — bob UAS / registration
  #   172.20.0.73 — alice UAC
  #
  # Usage:
  #   docker compose -f sipp/docker-compose.yaml --profile ims build
  #   docker compose -f sipp/docker-compose.yaml --profile ims \
  #     up --abort-on-container-exit sipp-ims-uac

  siphon-ims:
    build:
      context: ..
    container_name: siphon-ims-test
    volumes:
      - ./ims/scscf-lab.yaml:/etc/siphon/siphon.yaml:ro
      - ../scripts:/etc/siphon/scripts:ro
      - ../examples:/etc/siphon/examples:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.70
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM); s.settimeout(2); s.sendto(b'OPTIONS sip:ims.test SIP/2.0\\r\\nVia: SIP/2.0/UDP 127.0.0.1:15060;branch=z9hG4bK-hc\\r\\nFrom: <sip:hc@ims.test>;tag=hc\\r\\nTo: <sip:ims.test>\\r\\nCall-ID: hc@check\\r\\nCSeq: 1 OPTIONS\\r\\nMax-Forwards: 1\\r\\nContent-Length: 0\\r\\n\\r\\n', ('127.0.0.1',6060)); s.recv(1024); s.close()\""]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s
