  # --- B2BUA reliable-provisional interworking test ---
  # B-leg answers with a reliable 183 (Require: 100rel, RSeq); the A-leg never
  # advertised 100rel.  siphon must auto-PRACK the B-leg and strip the 100rel
  # contract from the 183 forwarded to the A-leg (else a real trunk CANCELs).
  #
  # Runs against a DEDICATED siphon instance pinned to `sip-trunk-edge@2026`
  # (the BGCF/trunk-edge policy whose response default is Copy — it does NOT
  # strip Require/RSeq).  This proves the strip is framework-auto, not a
  # side effect of the default transparent-b2bua@2026 preset.
  #
  #   172.20.0.58 — siphon-b2bua-trunk-edge
  #   172.20.0.59 — registration helper
  #   172.20.0.52 — B-leg UAS (reliable 183)
  #   172.20.0.53 — A-leg UAC (non-100rel trunk)

  siphon-b2bua-trunk-edge:
    build:
      context: ..
    container_name: siphon-b2bua-trunk-edge-test
    volumes:
      - ./configs/siphon.b2bua-trunk-edge-test.yaml:/etc/siphon/siphon.yaml:ro
      - ../scripts:/etc/siphon/scripts:ro
      - ../examples:/etc/siphon/examples:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.58
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM); s.settimeout(2); s.sendto(b'OPTIONS sip:siphon.test SIP/2.0\\r\\nVia: SIP/2.0/UDP 127.0.0.1:15060;branch=z9hG4bK-hc\\r\\nFrom: <sip:hc@siphon.test>;tag=hc\\r\\nTo: <sip:siphon.test>\\r\\nCall-ID: hc@check\\r\\nCSeq: 1 OPTIONS\\r\\nMax-Forwards: 1\\r\\nContent-Length: 0\\r\\n\\r\\n', ('127.0.0.1',5060)); s.recv(1024); s.close()\""]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s
    profiles:
      - b2bua-reliable-prov

  sipp-b2bua-trunk-edge-register:
    image: ctaloi/sipp:latest
    depends_on:
      siphon-b2bua-trunk-edge:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.59
    entrypoint:
      - sipp
      - "172.20.0.58:5060"
      - -sf
      - /sipp/scenarios/register_alice_contact.xml
      - -inf
      - /sipp/scenarios/b2bua_bob_contact.csv
      - -s
      - bob
      - -ap
      - secret
      - -m
      - "1"
      - -timeout
      - "10"
    profiles:
      - b2bua-reliable-prov

  sipp-b2bua-reliable-prov-uas:
    image: ctaloi/sipp:latest
    depends_on:
      sipp-b2bua-trunk-edge-register:
        condition: service_completed_successfully
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.52
    entrypoint:
