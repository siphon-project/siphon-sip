# sipp/docker-compose.yaml — SIPhon functional test stack
#
# Usage:
#   docker compose -f sipp/docker-compose.yaml build
#   docker compose -f sipp/docker-compose.yaml up -d siphon
#   docker compose -f sipp/docker-compose.yaml run --rm sipp-options
#   docker compose -f sipp/docker-compose.yaml run --rm sipp-register
#   docker compose -f sipp/docker-compose.yaml down
#
# IPsec tests (requires CAP_NET_ADMIN):
#   docker compose -f sipp/docker-compose.yaml --profile ipsec run --rm sipp-ipsec

services:
  # ── SIPhon under test ──────────────────────────────────────────────────────
  siphon:
    build:
      context: ..
    container_name: siphon-test
    volumes:
      - ./configs/siphon.test.yaml:/etc/siphon/siphon.yaml:ro
      - ../scripts:/etc/siphon/scripts:ro
      - ../examples:/etc/siphon/examples:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.10
    healthcheck:
      # Minimal UDP OPTIONS probe — just check the process is listening
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM); s.settimeout(2); s.sendto(b'OPTIONS sip:siphon.test SIP/2.0\\r\\nVia: SIP/2.0/UDP 127.0.0.1:15060;branch=z9hG4bK-hc\\r\\nFrom: <sip:hc@siphon.test>;tag=hc\\r\\nTo: <sip:siphon.test>\\r\\nCall-ID: hc@check\\r\\nCSeq: 1 OPTIONS\\r\\nMax-Forwards: 1\\r\\nContent-Length: 0\\r\\n\\r\\n', ('127.0.0.1',5060)); s.recv(1024); s.close()\""]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s

  # ── Basic SIPp tests ───────────────────────────────────────────────────────

  sipp-options:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.20
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/options.xml
      - -m
      - "5"
      - -l
      - "1"
      - -timeout
      - "10"
      - -trace_err

  sipp-register:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.21
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/register.xml
      - -s
      - alice
      - -ap
      - secret
      - -m
      - "1"
      - -l
      - "1"
      - -timeout
      - "15"
      - -trace_err

  # ── Call test (UAC + UAS through siphon) ───────────────────────────────────
  # Requires both alice and bob to be registered first.
  # Run sipp-register before this.

  sipp-uas:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.22
    entrypoint:
      - sipp
      - -sf
      - /sipp/scenarios/invite_uas.xml
      - -p
      - "5060"
      - -m
      - "1"
      - -timeout
      - "30"
    profiles:
      - call

  sipp-uac:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
      sipp-uas:
        condition: service_started
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.23
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/invite_uac.xml
      - -m
      - "1"
      - -l
      - "1"
      - -timeout
      - "30"
      - -trace_err
    profiles:
      - call

  # ── Presence/event tests (SUBSCRIBE/NOTIFY/MESSAGE through siphon) ────────
  # First register alice so the proxy can look up her contact,
  # then run subscribe UAC+UAS and message through the proxy.

  sipp-subscribe-uas:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.24
    entrypoint:
      - sipp
      - -sf
      - /sipp/scenarios/subscribe_uas.xml
      - -p
      - "5060"
      - -m
      - "1"
      - -timeout
      - "30"
    profiles:
      - presence

  sipp-subscribe-uac:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
      sipp-subscribe-uas:
        condition: service_started
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.25
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/subscribe_uac.xml
      - -s
      - alice
      - -m
      - "1"
      - -l
      - "1"
      - -timeout
      - "30"
      - -trace_err
    profiles:
      - presence

  # Register alice with Contact pointing to 172.20.0.26:5060 (the message UAS)
  sipp-message-register:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.28
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/register_alice_contact.xml
      - -inf
      - /sipp/scenarios/message_contact.csv
      - -s
      - alice
      - -ap
      - secret
      - -m
      - "1"
      - -timeout
      - "10"
    profiles:
      - presence

  # UAS at 172.20.0.26:5060 — receives MESSAGE relayed by proxy
  sipp-message-uas:
    image: ctaloi/sipp:latest
    depends_on:
      sipp-message-register:
        condition: service_completed_successfully
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.26
    entrypoint:
      - sipp
      - -sf
      - /sipp/scenarios/message_uas.xml
      - -p
      - "5060"
      - -m
      - "1"
      - -timeout
      - "30"
    profiles:
      - presence

  # UAC sends MESSAGE to alice@proxy — proxy relays to 172.20.0.26
  sipp-message-uac:
    image: ctaloi/sipp:latest
    depends_on:
      sipp-message-uas:
        condition: service_started
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.27
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/message.xml
      - -s
      - alice
      - -m
      - "1"
      - -l
      - "1"
      - -timeout
      - "15"
      - -trace_err
    profiles:
      - presence

  # ── NIST auto-100 Trying test ──────────────────────────────────────────────
  # Sends a MESSAGE that the UAS deliberately stalls 500 ms before answering.
  # The proxy's NIST auto-100 timer (default 200 ms) must fire and produce a
  # 100 Trying upstream; the UAC's scenario requires the 100 before the 200.

  # Register alice with Contact pointing to 172.20.0.36:5060 (slow UAS)
  sipp-message-auto100-register:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.38
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/register_alice_contact.xml
      - -inf
      - /sipp/scenarios/message_auto100_contact.csv
      - -s
      - alice
      - -ap
      - secret
      - -m
      - "1"
      - -timeout
      - "10"
    profiles:
      - auto100

  # Slow MESSAGE UAS at 172.20.0.36:5060 — pauses 500 ms before 200 OK
  sipp-message-auto100-uas:
    image: ctaloi/sipp:latest
    depends_on:
      sipp-message-auto100-register:
        condition: service_completed_successfully
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.36
    entrypoint:
      - sipp
      - -sf
      - /sipp/scenarios/message_auto100_uas.xml
      - -p
      - "5060"
      - -m
      - "1"
      - -timeout
      - "30"
    profiles:
      - auto100

  # UAC — requires 100 Trying from proxy before the upstream UAS's 200 OK
  sipp-message-auto100-uac:
    image: ctaloi/sipp:latest
    depends_on:
      sipp-message-auto100-uas:
        condition: service_started
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.37
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/message_auto100.xml
      - -s
      - alice
      - -m
      - "1"
      - -l
      - "1"
      - -timeout
      - "15"
      - -trace_err
    profiles:
      - auto100

  # ── UAS To-tag stamping test ───────────────────────────────────────────────
  # Sends MESSAGE to an unregistered user; siphon's script replies 404 itself
  # so the response is fully script-built. Asserts the 404's To header carries
  # a non-empty tag (RFC 3261 §8.2.6.2 — UAS MUST add To-tag on every response
  # except 100 Trying).
  sipp-message-404-to-tag:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.39
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/message_404_to_tag.xml
      - -s
      - nobody
      - -m
      - "1"
      - -l
      - "1"
      - -timeout
      - "10"
      - -trace_err
    profiles:
      - auto100

  # ── PUBLISH test (RFC 3903 presence publication) ───────────────────────────

  sipp-publish:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.29
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/publish.xml
      - -s
      - alice
      - -m
      - "1"
      - -l
      - "1"
      - -timeout
      - "15"
      - -trace_err
    profiles:
      - presence

  # ── INVITE with proxy auth test ──────────────────────────────────────────
  # Requires a UAS to answer the authenticated INVITE.
  # Uses invite_uas.xml as the backend.

  sipp-invite-auth-uas:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.31
    entrypoint:
      - sipp
      - -sf
      - /sipp/scenarios/invite_uas.xml
      - -p
      - "5060"
      - -m
      - "1"
      - -timeout
      - "30"
    profiles:
      - auth

  sipp-invite-auth:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
      sipp-invite-auth-uas:
        condition: service_started
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.32
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/invite_auth.xml
      - -s
      - alice
      - -ap
      - secret
      - -m
      - "1"
      - -l
      - "1"
      - -timeout
      - "30"
      - -trace_err
    profiles:
      - auth

  # ── Max-Forwards enforcement test ─────────────────────────────────────────
  # Sends INVITE with Max-Forwards: 0, expects 483 Too Many Hops.
  # Verifies RFC 3261 §16.3 enforcement at the dispatcher level (no UAS needed).

  sipp-max-forwards:
    image: ctaloi/sipp:latest
    depends_on:
      siphon:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.33
    entrypoint:
      - sipp
      - "172.20.0.10:5060"
      - -sf
      - /sipp/scenarios/max_forwards_uac.xml
      - -m
      - "5"
      - -l
      - "1"
      - -timeout
      - "10"
      - -trace_err

  # ── RTPEngine proxy test ──────────────────────────────────────────────────
  # Tests media anchoring through a mock RTPEngine via proxy script.
  # Requires the "rtpengine" profile.
  #
  # Flow: UAC → siphon proxy (rtpengine.offer) → UAS
  #       UAS 200 OK → siphon proxy (rtpengine.answer) → UAC
  # Both SDP bodies are verified to contain the mock RTPEngine IP.
  #
  # Usage:
  #   docker compose -f sipp/docker-compose.yaml --profile rtpengine \
  #     up --abort-on-container-exit sipp-rtpengine-uac sipp-rtpengine-uas

  # Mock RTPEngine — Python script simulating NG protocol on UDP 22222
  mock-rtpengine:
    image: python:3.12-slim
    container_name: mock-rtpengine
    volumes:
      - ./rtpengine:/app:ro
    working_dir: /app
    command: ["python3", "mock_rtpengine.py"]
    environment:
      RTPENGINE_PORT: "22222"
      MOCK_MEDIA_IP: "203.0.113.1"
      MOCK_MEDIA_PORT: "30000"
    networks:
      sipnet:
        ipv4_address: 172.20.0.40
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM); s.settimeout(2); s.sendto(b'hc d7:command4:pinge', ('127.0.0.1',22222)); d=s.recv(1024); s.close(); exit(0 if b'pong' in d else 1)\""]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 3s
    profiles:
      - rtpengine

  # SIPhon proxy with RTPEngine config
  siphon-rtpengine:
    build:
      context: ..
    container_name: siphon-rtpengine-test
    depends_on:
      mock-rtpengine:
        condition: service_healthy
    volumes:
      - ./rtpengine/siphon-rtpengine.yaml:/etc/siphon/siphon.yaml:ro
      - ../scripts:/etc/siphon/scripts:ro
      - ../examples:/etc/siphon/examples:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.41
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM); s.settimeout(2); s.sendto(b'OPTIONS sip:siphon.test SIP/2.0\\r\\nVia: SIP/2.0/UDP 127.0.0.1:15060;branch=z9hG4bK-hc\\r\\nFrom: <sip:hc@siphon.test>;tag=hc\\r\\nTo: <sip:siphon.test>\\r\\nCall-ID: hc@check\\r\\nCSeq: 1 OPTIONS\\r\\nMax-Forwards: 1\\r\\nContent-Length: 0\\r\\n\\r\\n', ('127.0.0.1',5060)); s.recv(1024); s.close()\""]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s
    profiles:
      - rtpengine

  # Register bob from the UAS IP so proxy knows where to relay
  sipp-rtpengine-register:
    image: ctaloi/sipp:latest
    depends_on:
      siphon-rtpengine:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.42
    entrypoint:
      - sipp
      - "172.20.0.41:5060"
      - -sf
      - /sipp/scenarios/register.xml
      - -s
      - bob
      - -ap
      - secret
      - -m
      - "1"
      - -timeout
      - "10"
    profiles:
      - rtpengine

  # B-leg UAS: receives INVITE relayed by proxy with RTPEngine-rewritten SDP
  sipp-rtpengine-uas:
    image: ctaloi/sipp:latest
    depends_on:
      sipp-rtpengine-register:
        condition: service_completed_successfully
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.42
    entrypoint:
      - sipp
      - -sf
      - /sipp/scenarios/rtpengine_uas.xml
      - -p
      - "5060"
      - -m
      - "1"
      - -timeout
      - "30"
      - -trace_err
    profiles:
      - rtpengine

  # A-leg UAC: sends INVITE to proxy with SDP, expects RTPEngine-rewritten 200 OK
  sipp-rtpengine-uac:
    image: ctaloi/sipp:latest
    depends_on:
      siphon-rtpengine:
        condition: service_healthy
      sipp-rtpengine-uas:
        condition: service_started
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.43
    entrypoint:
      - sipp
      - "172.20.0.41:5060"
      - -sf
      - /sipp/scenarios/rtpengine_uac.xml
      - -m
      - "1"
      - -l
      - "1"
      - -timeout
      - "30"
      - -trace_err
    profiles:
      - rtpengine

  # ── RTPEngine re-INVITE test (hold/resume) ────────────────────────────────
  # Tests mid-dialog re-INVITE with RTPEngine offer/answer cycle.
  # Flow: INVITE → 200 → ACK → re-INVITE(hold) → 200 → ACK
  #                           → re-INVITE(resume) → 200 → ACK → BYE → 200

  sipp-reinvite-uas:
    image: ctaloi/sipp:latest
    depends_on:
      sipp-rtpengine-register:
        condition: service_completed_successfully
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.42
    entrypoint:
      - sipp
      - -sf
      - /sipp/scenarios/reinvite_uas.xml
      - -p
      - "5060"
      - -m
      - "1"
      - -timeout
      - "30"
      - -trace_err
    profiles:
      - reinvite

  sipp-reinvite-uac:
    image: ctaloi/sipp:latest
    depends_on:
      siphon-rtpengine:
        condition: service_healthy
      sipp-reinvite-uas:
        condition: service_started
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.43
    entrypoint:
      - sipp
      - "172.20.0.41:5060"
      - -sf
      - /sipp/scenarios/reinvite_uac.xml
      - -m
      - "1"
      - -l
      - "1"
      - -timeout
      - "30"
      - -trace_err
    profiles:
      - reinvite

  # ── B2BUA tests ──────────────────────────────────────────────────────────
  # Tests the B2BUA with basic call, session timers, CANCEL, and failure.
  # Uses a separate siphon instance with B2BUA config.
  #
  # IP assignments:
  #   172.20.0.50 — siphon-b2bua
  #   172.20.0.51 — registration helper
  #   172.20.0.52 — B-leg UAS (basic + session timer)
  #   172.20.0.53 — A-leg UAC
  #   172.20.0.54 — B-leg UAS (failure)
  #   172.20.0.55 — A-leg UAC (failure)
  #   172.20.0.56 — B-leg UAS (cancel)
  #   172.20.0.57 — A-leg UAC (cancel)

  siphon-b2bua:
    build:
      context: ..
    container_name: siphon-b2bua-test
    volumes:
      - ./configs/siphon.b2bua-test.yaml:/etc/siphon/siphon.yaml:ro
      - ../scripts:/etc/siphon/scripts:ro
      - ../examples:/etc/siphon/examples:ro
    networks:
      sipnet:
        ipv4_address: 172.20.0.50
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(socket.AF_INET,socket.SOCK_DGRAM); s.settimeout(2); s.sendto(b'OPTIONS sip:siphon.test SIP/2.0\\r\\nVia: SIP/2.0/UDP 127.0.0.1:15060;branch=z9hG4bK-hc\\r\\nFrom: <sip:hc@siphon.test>;tag=hc\\r\\nTo: <sip:siphon.test>\\r\\nCall-ID: hc@check\\r\\nCSeq: 1 OPTIONS\\r\\nMax-Forwards: 1\\r\\nContent-Length: 0\\r\\n\\r\\n', ('127.0.0.1',5060)); s.recv(1024); s.close()\""]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 10s
    profiles:
      - b2bua
      - b2bua-session-timer
      - b2bua-failure
      - b2bua-reinvite
      - b2bua-reinvite-bleg
      - b2bua-reinvite-reject
      - b2bua-reinvite-breject
      - b2bua-update
      - b2bua-cancel
      - b2bua-early-media
      - b2bua-topology

  # Register bob with Contact pointing to the basic UAS IP (172.20.0.52)
  sipp-b2bua-register:
    image: ctaloi/sipp:latest
    depends_on:
      siphon-b2bua:
        condition: service_healthy
    volumes:
      - .:/sipp/scenarios:ro
    networks:
      sipnet:
        # Register bob FROM the same IP his Contact points to (the UAS, .52).
        # The default B2BUA script forks over a local contact's captured inbound
        # flow (RFC 5626 §5.3), so the flow's source must be where the UAS
        # listens — otherwise the B-leg INVITE is routed to the register helper's
        # address (which exits) instead of the UAS. Safe to share .52 with the
        # UAS: the register runs `run --rm` and is gone before the UAS starts.
        ipv4_address: 172.20.0.52
    entrypoint:
      - sipp
      - "172.20.0.50:5060"
      - -sf
