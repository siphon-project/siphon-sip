name: docs

# Builds the mkdocs-material site from docs/ and publishes it to GitHub Pages.
# On pull requests it only builds (with --strict, so broken links/nav fail the
# check); on push to main it builds and deploys.

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/pages.yaml
      # The API reference is rendered from the SDK docstrings, so an SDK
      # change can break the strict build — re-validate on those too.
      - sdk/**
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
      - .github/workflows/pages.yaml
      - sdk/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.x"
        # `mkdocstrings[python]` renders the API reference from the siphon_sdk
        # docstrings; `black` formats the generated signatures across lines.
      - run: pip install mkdocs-material "mkdocstrings[python]" black
      - name: Build site (strict)
        run: mkdocs build --strict
      - name: Pin the custom domain
        run: echo "siphon-sip.org" > site/CNAME
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    # Deploy only from main; PRs just validate the build above.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
