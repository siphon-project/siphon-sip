# .github/workflows/ci.yaml — SIPhon CI pipeline
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:   # manual "Run workflow" — also the only trigger for sipp-ipsec

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust unit + integration tests ────────────────────────────────────────
  # Run twice: the default build (no SCTP — proves the crate compiles and the
  # suite passes WITHOUT the libsctp system dependency) and the `sctp` feature
  # (exercises the gated SIP/Diameter-over-SCTP transport code).
  rust-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: default
            flags: ""
            sctp: false
          - name: sctp
            flags: "--features sctp"
            sctp: true
    name: rust-tests (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v7

      - name: Install Python 3.14 (free-threaded)
        uses: deadsnakes/action@v3.2.0
        with:
          python-version: "3.14-dev"

      - name: Install SCTP system dependency
        if: ${{ matrix.sctp }}
        run: sudo apt-get update && sudo apt-get install -y libsctp-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: PYO3_PYTHON=python3.14 cargo test ${{ matrix.flags }}

  # ── Clippy lint gate ────────────────────────────────────────────────────
  # Mirrors the rust-tests build env (free-threaded Python 3.14 + libsctp-dev
  # are needed for the crate to compile at all). `-D warnings` turns any
  # clippy lint or rustc warning into a hard failure so the clippy-clean
  # baseline cannot regress.
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Python 3.14 (free-threaded)
        uses: deadsnakes/action@v3.2.0
        with:
          python-version: "3.14-dev"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsctp-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      # Lint both feature configs: the default build (SCTP off — guards against
      # unused imports/variables that only surface when the feature is disabled)
      # and `--all-features` (SCTP on — compiles the gated libsctp code).
      - name: Run clippy (default features)
        run: PYO3_PYTHON=python3.14 cargo clippy --all-targets -- -D warnings

      - name: Run clippy (all features)
        run: PYO3_PYTHON=python3.14 cargo clippy --all-targets --all-features -- -D warnings

  # ── Criterion bench compile gate ─────────────────────────────────────────
  # Keep the per-message hot-path criterion benches (benches/sip_hot_path.rs)
  # compiling so they never bit-rot. The hard ">10% regression fails" gate is
  # deliberately NOT run here: absolute timings on shared GitHub runners are too
  # noisy to gate on. That gate runs at release-cut on the same fixed hardware
  # as the README throughput table (scripts/bench_regression.sh, wired into
  # scripts/cut-release.sh). Mirrors rust-tests' build env (the crate links
  # PyO3, so the benches need free-threaded Python 3.14 + libsctp-dev to build).
  benches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Python 3.14 (free-threaded)
        uses: deadsnakes/action@v3.2.0
        with:
          python-version: "3.14-dev"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsctp-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Compile benches (no run)
        run: PYO3_PYTHON=python3.14 cargo bench --no-run --all-features

  # ── siphon-bin extension binary (opt-in SMPP) ───────────────────────────
  # The siphon-bin/ package is a SEPARATE, excluded standalone workspace that
  # git-deps the published siphon-sip lib + the extension crates, so the main
  # jobs above never build it. This job is the bit-rot guard for the
  # composition: it proves the `siphon` binary still compiles (and is
  # clippy-clean) both WITHOUT and WITH the `smpp` feature. Because the deps are
  # git `branch = "main"`, this builds against current siphon-sip/siphon-smpp
  # main — i.e. it validates the composition against the latest published lib,
  # not the in-tree lib of this checkout (the deliberate git-dep tradeoff).
  siphon-bin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: siphon-bin
    steps:
      - uses: actions/checkout@v7

      - name: Install Python 3.14 (free-threaded)
        uses: deadsnakes/action@v3.2.0
        with:
          python-version: "3.14-dev"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: siphon-bin

      # Feature off: plain composition (an `extensions.smpp` block parses and is
      # skipped with a loud warning — no siphon-smpp/smpp34 in the graph).
      - name: Build (no extensions)
        run: PYO3_PYTHON=python3.14 cargo build

      - name: Clippy (no extensions)
        run: PYO3_PYTHON=python3.14 cargo clippy -p siphon-bin -- -D warnings

      # Feature on: pulls siphon-smpp + smpp34 and wires the `smpp` namespace.
      - name: Build (--features smpp)
        run: PYO3_PYTHON=python3.14 cargo build --features smpp

      - name: Clippy (--features smpp)
        run: PYO3_PYTHON=python3.14 cargo clippy -p siphon-bin --features smpp -- -D warnings

  # ── Python SDK tests ──────────────────────────────────────────────────
  sdk-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - uses: actions/checkout@v7
        with:
          # hatch-vcs derives the SDK version from git tags, so the SDK
          # build needs full history — a shallow clone hides the tags.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install SDK and test dependencies
        run: pip install -e . pytest

      - name: Run SDK tests
        run: pytest -v

  # ── SBOM generation ────────────────────────────────────────────────────
  sbom:
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-sbom
        run: cargo install cargo-sbom

      - name: Generate SPDX SBOM
        run: cargo sbom --output-format spdx_json_2_3 > sbom.spdx.json

      - name: Generate CycloneDX SBOM
        run: cargo sbom --output-format cyclone_dx_json_1_4 > sbom.cdx.json

      - name: Upload SBOMs
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            sbom.spdx.json
            sbom.cdx.json

  # ── SIPp functional tests (basic) ───────────────────────────────────────
  sipp-functional:
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v7

      - name: Build siphon image
        run: docker compose -f sipp/docker-compose.yaml build siphon

      - name: Start siphon
        run: docker compose -f sipp/docker-compose.yaml up -d --wait siphon

      - name: SIPp OPTIONS test
        run: docker compose -f sipp/docker-compose.yaml run --rm sipp-options

      - name: SIPp REGISTER test
        run: docker compose -f sipp/docker-compose.yaml run --rm sipp-register

      - name: Collect siphon logs
        if: always()
        run: docker compose -f sipp/docker-compose.yaml logs siphon > siphon.log 2>&1 || true

      - name: Teardown
        if: always()
        run: docker compose -f sipp/docker-compose.yaml down --remove-orphans

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sipp-functional-logs
          path: |
            siphon.log
            *.log

  # ── B2BUA functional tests ─────────────────────────────────────────────
  sipp-b2bua:
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v7

      - name: Build siphon-b2bua image
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua build siphon-b2bua

      - name: Start siphon-b2bua
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua up -d --wait siphon-b2bua

      - name: Register bob
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua run --rm sipp-b2bua-register

      - name: B2BUA basic call (INVITE → 200 → BYE)
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua up --abort-on-container-exit sipp-b2bua-uac sipp-b2bua-uas

      - name: Cleanup basic call containers
        if: always()
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua down sipp-b2bua-uac sipp-b2bua-uas 2>/dev/null || true

      - name: B2BUA session timer (Session-Expires negotiation)
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua --profile b2bua-session-timer up --abort-on-container-exit sipp-b2bua-st-uac sipp-b2bua-st-uas

      - name: Cleanup session timer containers
        if: always()
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua-session-timer down sipp-b2bua-st-uac sipp-b2bua-st-uas 2>/dev/null || true

      - name: B2BUA CANCEL (INVITE → CANCEL → 487)
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua --profile b2bua-cancel up --abort-on-container-exit sipp-b2bua-cancel-uac sipp-b2bua-cancel-uas

      - name: Cleanup cancel containers
        if: always()
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua-cancel down sipp-b2bua-cancel-uac sipp-b2bua-cancel-uas 2>/dev/null || true

      - name: Deregister bob (clear previous contacts)
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua --profile b2bua-failure run --rm sipp-b2bua-deregister-bob

      - name: Register bob (failure UAS)
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua --profile b2bua-failure run --rm sipp-b2bua-register-failure

      - name: B2BUA failure (INVITE → 486 Busy)
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua --profile b2bua-failure up --abort-on-container-exit sipp-b2bua-failure-uac sipp-b2bua-failure-uas

      - name: Collect siphon-b2bua logs
        if: always()
        run: docker compose -f sipp/docker-compose.yaml logs siphon-b2bua > siphon-b2bua.log 2>&1 || true

      - name: Teardown
        if: always()
        run: docker compose -f sipp/docker-compose.yaml --profile b2bua --profile b2bua-session-timer --profile b2bua-cancel --profile b2bua-failure down --remove-orphans

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sipp-b2bua-logs
          path: |
            siphon-b2bua.log
            *.log

  # ── Fuzz testing (nightly) ─────────────────────────────────────────────
  fuzz:
    runs-on: ubuntu-latest
    needs: rust-tests
    steps:
      - uses: actions/checkout@v7

      - name: Install Python 3.14 (free-threaded)
        uses: deadsnakes/action@v3.2.0
        with:
          python-version: "3.14-dev"

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Run fuzz target (60s)
        run: PYO3_PYTHON=python3.14 cargo +nightly fuzz run sip_parser_fuzz -- -max_total_time=60

  # ── SIPp IPsec VoLTE test (manual-only) ────────────────────────────────
  # IPsec XFRM SA installation needs CAP_NET_ADMIN, which GitHub-hosted runners
  # don't grant — this can NEVER pass here. It used to run on every push/PR,
  # burning ~7 min compiling siphon for a guaranteed (continue-on-error) red.
  # Now it only runs on a manual `workflow_dispatch`, so point that at a
  # privileged/self-hosted runner when you actually want it. The ipsec logic is
  # covered by the unit tests in rust-tests.
  sipp-ipsec:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: rust-tests
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Build siphon and sipp-ipsec images
        run: |
          docker compose -f sipp/docker-compose.yaml build siphon
          docker compose -f sipp/docker-compose.yaml --profile ipsec build sipp-ipsec

      - name: Start siphon
        run: docker compose -f sipp/docker-compose.yaml up -d --wait siphon

      - name: SIPp IPsec VoLTE registration
        run: docker compose -f sipp/docker-compose.yaml --profile ipsec run --rm sipp-ipsec

      - name: Collect logs
        if: always()
        run: docker compose -f sipp/docker-compose.yaml logs siphon > siphon-ipsec.log 2>&1 || true

      - name: Teardown
        if: always()
        run: docker compose -f sipp/docker-compose.yaml down --remove-orphans

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sipp-ipsec-logs
          path: |
            siphon-ipsec.log
            *.log
